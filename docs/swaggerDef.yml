    url: "https://tavanbogdfinance.com/_nuxt/img/logo-dark.b6ee3c3.png"
    altText: TBFinance logo
  contact:
    name: Таван богд финанс - Team Backend
servers:
  - url: https://test-emongolia.payon.mn/api
    description: Api endpoints
  - url: https://test-emongolia.payon.mn
    description: Public endpoints
tags:
