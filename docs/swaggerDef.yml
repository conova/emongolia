      operationId: Invalid param exception
      tags:
        - Public
      responses:
        "200":
          description: Response
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Invalid Param Exception"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /exception:
    get:
      summary: Exception
      operationId: Exception
      tags:
        - Public
      responses:
        "200":
          description: Response
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Exception"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      example: { code: 1000, response: "Unexpected error" }
      type: object
      properties:
        code:
          type: number
          description: Error code
        response:
          type: string
          description: Error Message
    Exception:
      example: { code: 1000, response: "Exception" }
      type: object
      properties:
        code:
          type: number
          description: Error code
        response:
          type: string
          description: Error Message
    Unauthorized:
      example: { code: 401, response: "Unauthorized" }
      type: object
      properties:
        code:
          type: number
          description: Error code
        response:
          type: string
          description: Error Message
    Invalid Param Exception:
      example: { code: 1000, response: "Invalid Param" }
      type: object
      properties:
        code:
          type: number
          description: Error code
        response:
          type: string
          description: Error Message
    Health Response:
      example: { code: 0, response: "Working" }
      type: object
      properties:
        code:
          type: number
          description: Error code
        response:
          type: string
          description: Response
    Home page:
      example: "<h2>Hello World!</h2>"
      type: string
      description: "Нүүр хуудас"
    eMongoliaUri:
      example:
        {
          "code": 0,
          "response":
            {
              "uri": "http://localhost/api/e/redirect/126?state=8873e98070f5a3784e2bfe03e597a473b9458b01f58fc78f41523e4efca245f2",
              "state": "8873e98070f5a3784e2bfe03e597a473b9458b01f58fc78f41523e4efca245f2",
