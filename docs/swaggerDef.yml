  /e/check:
    get:
      summary: Get request detail
      operationId: checkRequest
      tags:
        - eMongolia
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: requestId
          schema:
            type: number
          required: true
          description: Request id
        - in: query
          name: state
          schema:
            type: string
          required: true
          description: State
      responses:
        "200":
          description: eMongolia https uri
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Request"
                  - $ref: "#/components/schemas/Invalid Param Exception"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Unauthorized"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /s/service:
    post:
      summary: Create a new service
      operationId: service
      tags:
        - Services
      security:
        - bearerAuth: []
      requestBody:
        description: Service object
        required: true
        content:
          application/json:
            schema:
              type: object
              example:
                {
                  "code": "WS100001_listAccess",
                  "name": "Зөвшөөрөгдсөн веб сервис болон түүний гаралтын жагсаалтыг авах сервис",
                  "wsdl": "https://xyp.gov.mn/meta-1.2.0/ws?WSDL",
                  "params":
                    [
                      { "param": "param1", "desc": "test", "type": "string" },
                      { "param": "param2", "desc": "test1", "type": "int" },
                    ],
                }
              properties:
                code:
                  type: string
                  description: Unique code of DAN services
                name:
                  type: string
                  description: Name or description of service
                wsdl:
                  type: string
                  description: WSDL of DAN services
                params:
                  type: array
                  items:
                    type: object
                    properties:
                      param:
                        type: string
                        description: Parameter name
                      desc:
                        type: string
                        description: Description of parameter
                      type:
                        type: string
                        enum: [string, int, boolean]
                        description: Type of parameter
      responses:
        "200":
          description: New service details
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/New Service"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Unauthorized"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /s/services:
    get:
      summary: Get a service
      operationId: service list
      tags:
        - Services
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [ACTIVE, INACTIVE]
          required: false
          description: Status
      responses:
        "200":
          description: Service list
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Services"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Unauthorized"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /s/service/{code}:
    get:
      summary: Get a service
      operationId: get a service
      tags:
        - Services
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: code
          schema:
            type: string
            enum:
