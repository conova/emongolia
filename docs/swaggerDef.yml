openapi: 3.0.0
info:
  version: 1.0.0
  title: EMongolia Gateway service API documentation
  description: |
    __General API information__

    ---

    * All endpoints return either a JSON object or array.

    __Error Codes and Messages__

    ---

     * If there is an error, the API will return __HTTP 200__ with an error code and a message of the reason.
     * HTTP __5XX__ return codes are used for internal errors
     * Error codes and messages
        | Code    | Message                            |
        | ------- | ---------------------------------- |
        | 0       | __Success__                        |
        | 400     | __Bad request__                    |
        | 1001    | __Invalid parameter__              |
        | 1002    | __Service not found__              |
        | 1003    | __Required parameter missing__     |
        | 1004    | __Request not found__              |
        | 1005    | __State is not same__              |

    __ENUM definitions__

    ---

    __*Request status:*__
    * PENDING
    * DONE
    * ENTERED
    * FAILED

    __*Service status:*__
    * ACTIVE
    * INACTIVE

