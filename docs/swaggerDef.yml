paths:
  /e/uri:
    post:
      summary: Get eMongolia https uri
      operationId: eMongolia_uri
      tags:
        - eMongolia
      security:
        - bearerAuth: []
      requestBody:
        description: Services list
        required: true
        content:
          application/json:
            schema:
              required:
                - services
                - unique
              type: object
              example:
                {
                  "unique": "AA99008877",
                  "callback": "127.0.0.1:8080",
                  "services":
                    [
                      { "code": "CITIZEN_ID_CARD_INFO" },
                      {
                        "code": "SALARY_INCOME",
                        "params": { "endYear": "2022", "startYear": "2022" },
                      },
                    ],
                }
              properties:
                unique:
                  type: string
                  description: |
                    Unique id of user.
                    "user_id", "phoneNumber", "registerNumber" etc...
                services:
                  type: array
                  description: Service list
                  items:
                    type: object
                    properties:
                      code:
                        type: string
                        description: Unique code of service
                        enum:
                          - CITIZEN_ID_CARD_INFO
                          - CITIZEN_BIRTH_INFO
                          - CITIZEN_ADDRESS_INFO
                          - CITIZEN_MARRIAGE_INFO
                          - CITIZEN_MARRIAGE_DIVORCE_INFO
                          - AUTHORIZE_CITIZEN
                          - CITIZEN_INFO
                          - CHECK_CITIZEN_REGNUM
                          - CITIZEN_NO_MARRIEGE_INFO
                          - PROPERTY_INFO
                          - PROPERTY_LIST
                          - LEGAL_ENTITY_INFO_WITH_REGNUM
                          - VEHICLE_INFO_OLD
                          - VEHICLE_OWNER_HISTORY_LIST
                          - VEHICLE_PENALTY_LIST
                          - CITIZEN_VEHICLE_LIST
                          - DRIVER_LICENSE_INFO
                          - SALARY_INCOME
                          - CITIZEN_PENSION_INQUIRY
                          - TAX_PAYER_INFO
                          - VEHICLE_PAID_TAX_HISTORY
                          - VEHICLE_TAX_PAYABLE_INFO
                          - VEHICLE_INFO
                      params:
                        type: object
                        description: Depends of service
      responses:
        "200":
          description: eMongolia https uri
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/eMongoliaUri"
                  - $ref: "#/components/schemas/Invalid Param Exception"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Unauthorized"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
      callbacks:
        notifyService:
          "{HES uri}":
            post:
              requestBody:
                content:
                  application/json:
                    schema:
                      type: object
                      example:
                        {
                          "unique": "99125116",
