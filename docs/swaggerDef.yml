        }
      type: object
      properties:
        code:
          type: number
          description: |
            Error code:
            0 - success, others - error
        response:
          type: object
          properties:
            uri:
              type: string
              description: Redirect uri
            state:
              type: string
              description: Unique id of system
            requestId:
              type: number
              description: Request id
    New Service:
