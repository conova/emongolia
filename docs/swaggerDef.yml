              - VEHICLE_PENALTY_LIST
              - CITIZEN_VEHICLE_LIST
              - DRIVER_LICENSE_INFO
              - SALARY_INCOME
              - CITIZEN_PENSION_INQUIRY
              - TAX_PAYER_INFO
              - VEHICLE_PAID_TAX_HISTORY
              - VEHICLE_TAX_PAYABLE_INFO
              - VEHICLE_INFO
          required: true
          description: Code of service
      responses:
        "200":
          description: Service object
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Service"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Unauthorized"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      summary: Update a service
      operationId: update a service
      tags:
        - Services
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: code
          schema:
            type: string
          required: true
          description: Code of service
      responses:
        "200":
          description: Updated service object
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Updated Service"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Unauthorized"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      summary: Delete a service
      operationId: delete a service
      tags:
        - Services
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: code
          schema:
            type: string
          required: true
          description: Code of service
      responses:
        "200":
          description: Response
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Deleted Service"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Unauthorized"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

